<!DOCTYPE html>
<html>
<head>

<title>Room Booking</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

<h2>IIIT Dharwad</h2>

<a href="#">Home</a>
<a href="book.html">Book Room</a>
<a href="view.html">View Bookings</a>

</div>

<div class="content">

<h1>Meeting Room Booking</h1>

<div class="form-card">

<form id="bookingForm">

<label>Name</label>
<input type="text" id="name" required>

<label>Room</label>
<select id="room" required>
<option>Room A</option>
<option>Room B</option>
<option>Seminar Hall</option>
</select>

<label>Date</label>
<input type="date" id="date" required>


<label>Start Time</label>

<div class="time-row">

<select id="startHour">
<option>01</option><option>02</option><option>03</option>
<option>04</option><option>05</option><option>06</option>
<option>07</option><option>08</option><option>09</option>
<option>10</option><option>11</option><option>12</option>
</select>

<select id="startMinute">
<option>00</option>
<option>15</option>
<option>30</option>
<option>45</option>
</select>

<select id="startAMPM">
<option>AM</option>
<option>PM</option>
</select>

</div>


<label>End Time</label>

<div class="time-row">

<select id="endHour">
<option>01</option><option>02</option><option>03</option>
<option>04</option><option>05</option><option>06</option>
<option>07</option><option>08</option><option>09</option>
<option>10</option><option>11</option><option>12</option>
</select>

<select id="endMinute">
<option>00</option>
<option>15</option>
<option>30</option>
<option>45</option>
</select>

<select id="endAMPM">
<option>AM</option>
<option>PM</option>
</select>

</div>

<button type="submit">Book Room</button>

</form>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
